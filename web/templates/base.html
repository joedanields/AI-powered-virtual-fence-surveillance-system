<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Virtual Fence Dashboard{% endblock %}</title>
    <style>
        :root {
            --bg-primary: #0f1923;
            --bg-secondary: #1a2634;
            --bg-card: #243447;
            --accent: #e74c3c;
            --accent-soft: #c0392b;
            --text: #ecf0f1;
            --text-muted: #95a5a6;
            --success: #27ae60;
            --warning: #f39c12;
            --border: #2c3e50;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            line-height: 1.6;
        }
        .navbar {
            background: var(--bg-secondary);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar h1 {
            font-size: 1.3rem;
            color: var(--accent);
        }
        .navbar h1 span { color: var(--text); }
        .navbar nav a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .navbar nav a:hover { color: var(--text); }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 1.5rem;
            border-left: 4px solid var(--accent);
        }
        .stat-card h3 { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .stat-card .value { font-size: 2rem; font-weight: 700; }
        .card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--accent);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
        }
        th { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; }
        tr:hover { background: rgba(255,255,255,0.03); }
        .badge {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-new { background: var(--accent); color: white; }
        .badge-ack { background: var(--success); color: white; }
        a.btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.2s;
        }
        a.btn-primary { background: var(--accent); color: white; }
        a.btn-primary:hover { background: var(--accent-soft); }
        .pager {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 1.5rem;
        }
        .pager a {
            padding: 0.4rem 0.8rem;
            background: var(--bg-secondary);
            color: var(--text);
            border-radius: 4px;
            text-decoration: none;
        }
        .pager a.active { background: var(--accent); }
        .screenshot {
            max-width: 100%;
            border-radius: 8px;
            border: 2px solid var(--border);
        }
        .chart-bar {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 120px;
            padding: 0.5rem 0;
        }
        .chart-bar .bar {
            flex: 1;
            background: var(--accent);
            border-radius: 3px 3px 0 0;
            min-height: 4px;
            position: relative;
        }
        .chart-bar .bar span {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: var(--text-muted);
            white-space: nowrap;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🛡 <span>Virtual Fence</span> Dashboard</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/events">Events</a>
        </nav>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <footer>AI Virtual Fence Intrusion Detection System</footer>
</body>
</html>
